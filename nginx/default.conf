upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend_upstream/health;
        proxy_set_header Host $host;
    }

    location /ready {
        proxy_pass http://backend_upstream/ready;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://backend_upstream/metrics;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend_upstream/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend_upstream/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend_upstream/openapi.json;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}